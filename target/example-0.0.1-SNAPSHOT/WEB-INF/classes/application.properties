# ============================================
# CONFIGURATION DE BASE
# ============================================
spring.application.name=cinema

# ============================================
# CONFIGURATION SPRING MVC POUR JSP
# ============================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# Desactiver Thymeleaf
spring.thymeleaf.enabled=false

# ============================================
# CONFIGURATION DES RESSOURCES STATIQUES
# ============================================
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/

# Cache des ressources
spring.web.resources.cache.period=31536000
spring.web.resources.cache.cachecontrol.max-age=31536000

# Encodage
spring.web.encoding.charset=UTF-8
spring.web.encoding.enabled=true
spring.web.encoding.force=true

# ============================================
# CONFIGURATION POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/cinema
spring.datasource.username=postgres
spring.datasource.password=sql
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# CONFIGURATION JPA/HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

# ============================================
# CONFIGURATION SERVEUR
# ============================================
server.port=8000
server.servlet.context-path=/

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.com.cinema.example=DEBUG